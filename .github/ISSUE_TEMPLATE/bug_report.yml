name: Bug report
description: Report a defect in Fylgyr behavior
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal sequence to reproduce the behavior.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual behavior
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: input
    id: module_version
    attributes:
      label: Fylgyr module version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: powershell_version
    attributes:
      label: PowerShell version
      placeholder: 7.4.0
    validations:
      required: true
