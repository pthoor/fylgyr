name: Dogfood Policy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  supply-chain-policy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Fylgyr against own workflows
        id: fylgyr
        shell: pwsh
        run: |
          Import-Module ./src/Fylgyr/Fylgyr.psm1 -Force

          $scanParams = @{
            Owner       = '${{ github.repository_owner }}'
            Repo        = '${{ github.event.repository.name }}'
            Token       = $env:GITHUB_TOKEN
          }

          # Single Object scan — reused for console output and failure check
          $results = Invoke-Fylgyr @scanParams

          # Separate SARIF scan for upload (one extra call; Object format has no SARIF serialiser in public API)
          Invoke-Fylgyr @scanParams -OutputFormat SARIF | Out-File -FilePath fylgyr.sarif -Encoding utf8

          # Console summary from cached results
          Write-Host ''
          Write-Host 'Fylgyr Supply-Chain Audit: ${{ github.repository_owner }}/${{ github.event.repository.name }}'
          Write-Host ('-' * 60)
          $results | Format-Table CheckName, Status, Severity, Resource -AutoSize | Out-String | Write-Host
          $counts = $results | Group-Object Status | ForEach-Object { "$($_.Name): $($_.Count)" }
          Write-Host ($counts -join ' | ')
          Write-Host ('-' * 60)

          # Fail the job if any check returned Fail
          $failures = $results | Where-Object { $_.Status -eq 'Fail' }
          if ($failures) {
            Write-Error "Fylgyr found $($failures.Count) policy violation(s). See above for details."
            exit 1
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('fylgyr.sarif') != ''
        uses: github/codeql-action/upload-sarif@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169
        with:
          sarif_file: fylgyr.sarif
