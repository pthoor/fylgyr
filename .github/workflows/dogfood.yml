name: Dogfood Policy

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  supply-chain-policy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Fylgyr against own workflows
        id: fylgyr
        shell: pwsh
        run: |
          Import-Module ./src/Fylgyr/Fylgyr.psm1 -Force

          $results = Invoke-Fylgyr `
            -Owner '${{ github.repository_owner }}' `
            -Repo  '${{ github.event.repository.name }}' `
            -Token $env:GITHUB_TOKEN

          # Emit SARIF for code scanning upload
          $sarif = Invoke-Fylgyr `
            -Owner '${{ github.repository_owner }}' `
            -Repo  '${{ github.event.repository.name }}' `
            -Token $env:GITHUB_TOKEN `
            -OutputFormat SARIF
          $sarif | Out-File -FilePath fylgyr.sarif -Encoding utf8

          # Print console summary
          Invoke-Fylgyr `
            -Owner '${{ github.repository_owner }}' `
            -Repo  '${{ github.event.repository.name }}' `
            -Token $env:GITHUB_TOKEN `
            -OutputFormat Console

          # Fail the job if any check returned Fail
          $failures = $results | Where-Object { $_.Status -eq 'Fail' }
          if ($failures) {
            Write-Error "Fylgyr found $($failures.Count) policy violation(s). See above for details."
            exit 1
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169
        with:
          sarif_file: fylgyr.sarif
