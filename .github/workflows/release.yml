name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest -Path ./src/Fylgyr/Fylgyr.psd1

      - name: Verify tag matches module version
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile ./src/Fylgyr/Fylgyr.psd1
          $moduleVersion = $manifest.ModuleVersion
          $tagVersion = $env:GITHUB_REF_NAME -replace '^v', ''

          if ($moduleVersion -ne $tagVersion) {
            throw "Tag version '$tagVersion' does not match ModuleVersion '$moduleVersion' in Fylgyr.psd1."
          }

          Write-Host "Version match confirmed: $moduleVersion"

      - name: Lint
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Repository PSGallery -Scope CurrentUser -Force -AcceptLicense
          $results = Invoke-ScriptAnalyzer -Path ./src -Recurse -Severity Error,Warning
          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found $($results.Count) issue(s)."
          }
          Write-Host "PSScriptAnalyzer: clean"

      - name: Run tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Repository PSGallery -Scope CurrentUser -Force -AcceptLicense
          $testResult = Invoke-Pester -Path ./tests -Output Detailed -PassThru
          if ($testResult.FailedCount -gt 0) {
            throw "Pester failed with $($testResult.FailedCount) failed test(s)."
          }

  publish:
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            throw 'PSGALLERY_API_KEY secret is not set.'
          }

          Publish-Module -Path ./src/Fylgyr -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "GitHub release for tag ${{ github.ref_name }} already exists; skipping creation."
          else
            gh release create "${{ github.ref_name }}" \
              --title "Fylgyr ${{ github.ref_name }}" \
              --generate-notes
          fi
