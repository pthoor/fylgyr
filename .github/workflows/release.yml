name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Harden runner egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            www.powershellgallery.com:443
            cdn.powershellgallery.com:443
            psg-prod-eastus.azureedge.net:443

      - name: Install manifest dependency
        shell: pwsh
        run: |
          Install-Module -Name powershell-yaml -Repository PSGallery -Scope CurrentUser -Force -AcceptLicense

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest -Path ./src/Fylgyr/Fylgyr.psd1

      - name: Verify tag matches module version
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile ./src/Fylgyr/Fylgyr.psd1
          $moduleVersion = $manifest.ModuleVersion
          $tagVersion = $env:GITHUB_REF_NAME -replace '^v', ''

          if ($moduleVersion -ne $tagVersion) {
            throw "Tag version '$tagVersion' does not match ModuleVersion '$moduleVersion' in Fylgyr.psd1."
          }

          Write-Host "Version match confirmed: $moduleVersion"

      - name: Lint
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Repository PSGallery -Scope CurrentUser -Force -AcceptLicense
          $paths = Get-ChildItem -Path ./src -Recurse -File |
            Where-Object { $_.Extension -in @('.ps1', '.psm1') } |
            Sort-Object -Property FullName

          $blocking = [System.Collections.Generic.List[object]]::new()

          foreach ($path in $paths) {
            try {
              $issues = @(Invoke-ScriptAnalyzer -Path $path.FullName -Severity Error,Warning)
              foreach ($issue in $issues) {
                $blocking.Add($issue)
              }
            }
            catch {
              Write-Host "PSScriptAnalyzer failed for $($path.FullName): $($_.Exception.Message)"
              exit 1
            }
          }

          if ($blocking.Count -gt 0) {
            $blocking | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize | Out-String | Write-Host
            Write-Host "PSScriptAnalyzer found $($blocking.Count) issue(s)."
            exit 1
          }
          Write-Host "PSScriptAnalyzer: clean"

      - name: Run tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Repository PSGallery -Scope CurrentUser -Force -AcceptLicense
          $testResult = Invoke-Pester -Path ./tests -Output Detailed -PassThru
          if ($testResult.FailedCount -gt 0) {
            throw "Pester failed with $($testResult.FailedCount) failed test(s)."
          }

  publish:
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Harden runner egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            api.nuget.org:443
            globalcdn.nuget.org:443
            www.powershellgallery.com:443
            cdn.powershellgallery.com:443
            psg-prod-eastus.azureedge.net:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            token.actions.githubusercontent.com:443

      - name: Package module
        shell: pwsh
        run: |
          $version = (Import-PowerShellDataFile ./src/Fylgyr/Fylgyr.psd1).ModuleVersion
          Compress-Archive -Path ./src/Fylgyr/* -DestinationPath "fylgyr-$version.zip"
          Write-Host "Packaged fylgyr-$version.zip"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'fylgyr-*.zip'

      - name: Install manifest dependency
        shell: pwsh
        run: |
          Install-Module -Name powershell-yaml -Repository PSGallery -Scope CurrentUser -Force -AcceptLicense

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            throw 'PSGALLERY_API_KEY secret is not set.'
          }

          Publish-Module -Path ./src/Fylgyr -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "GitHub release for tag ${{ github.ref_name }} already exists; skipping creation."
          else
            shopt -s nullglob
            artifacts=(fylgyr-*.zip)
            artifact="${artifacts[0]:-}"
            if [[ -z "$artifact" ]]; then
              echo "No packaged artifact matching fylgyr-*.zip was found."
              exit 1
            fi

            gh release create "${{ github.ref_name }}" \
              --title "Fylgyr ${{ github.ref_name }}" \
              --generate-notes \
              "$artifact"
          fi
