# Fylgyr Supply-Chain Audit
#
# This workflow scans your repository for supply chain risks and uploads
# the results to GitHub's Security tab (Code Scanning).
#
# Setup:
#   1. Copy this file to .github/workflows/fylgyr.yml in your repository.
#   2. Update the branch names below if your default branch is not
#      "main" or "master" (e.g., change to "trunk" or "develop").
#   3. No additional secrets are needed — the built-in GITHUB_TOKEN works.
#   4. Commit and push to your default branch.
#   5. Results appear under Security > Code scanning in your repository.
#
# Requirements:
#   - GitHub Actions enabled on the repository.
#   - "Code scanning" must be available (free for public repos, requires
#     GitHub Advanced Security for private repos on Enterprise plans).
#
# Permissions note:
#   The built-in GITHUB_TOKEN only supports contents:read and
#   security-events:write. Three repo-level checks need a PAT:
#
#   - BranchProtection: needs admin access (fine-grained PAT
#     with administration:read)
#   - SecretScanning: needs a PAT with repo scope (classic)
#     or secret-scanning-alerts:read (fine-grained)
#   - DependabotAlert: needs a PAT with repo scope (classic)
#     or vulnerability-alerts:read (fine-grained)
#
#   Without a PAT these checks report "Error: insufficient
#   permissions" and are safe to ignore. To enable them, create
#   a fine-grained PAT, add it as a repository secret (e.g.,
#   FYLGYR_TOKEN), and pass it via the -Token parameter:
#
#     -Token $env:FYLGYR_TOKEN
#
#   Then add to the step:
#     env:
#       FYLGYR_TOKEN: ${{ secrets.FYLGYR_TOKEN }}
#
# Triggers:
#   - push to default branch: populates the Security tab with baseline results.
#   - pull_request: checks PRs for new supply chain issues (same-repo only).
#   - schedule (weekly): catches drift from upstream action updates.
#   - workflow_dispatch: run manually anytime from the Actions tab.

name: Fylgyr Supply-Chain Audit

# TODO: Update branch names below if your default branch is not "main" or "master".
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'    # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  fylgyr:
    # Skip fork PRs — GITHUB_TOKEN from forks cannot upload security-events
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Fylgyr
        shell: pwsh
        run: |
          Install-Module -Name Fylgyr -Repository PSGallery -Force -Scope CurrentUser

      - name: Run Fylgyr scan
        shell: pwsh
        run: |
          # Run the scan and output SARIF for upload
          Invoke-Fylgyr -Owner '${{ github.repository_owner }}' `
                        -Repo '${{ github.event.repository.name }}' `
                        -OutputFormat SARIF `
            | Out-File -FilePath fylgyr.sarif -Encoding utf8

          # Also print a human-readable summary to the workflow log
          Invoke-Fylgyr -Owner '${{ github.repository_owner }}' `
                        -Repo '${{ github.event.repository.name }}' `
                        -OutputFormat Console
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security tab
        if: always() && hashFiles('fylgyr.sarif') != ''
        uses: github/codeql-action/upload-sarif@48ab28a6f5dbc2a99bf1e0131198dd8f1df78169 # v3.28.0
        with:
          sarif_file: fylgyr.sarif
