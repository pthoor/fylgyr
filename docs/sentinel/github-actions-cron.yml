name: Fylgyr Sentinel Drift

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  scan-and-ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Azure Login (OIDC)
        uses: azure/login@e4bf9f50f79f4026bb073d6f05f93ca298df63d2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Fylgyr
        shell: pwsh
        run: Install-Module -Name Fylgyr -Repository PSGallery -Scope CurrentUser -Force

      - name: Scan and ingest to Log Analytics
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $lines = Invoke-Fylgyr -Owner '${{ github.repository_owner }}' `
                                -Repo '${{ github.event.repository.name }}' `
                                -Mode Both `
                                -OutputFormat LogAnalytics

          $federatedToken = Get-Content $env:AZURE_FEDERATED_TOKEN_FILE -Raw

          $lines |
            Send-FylgyrToLogAnalytics `
              -DcrImmutableId '${{ secrets.AZURE_DCR_IMMUTABLE_ID }}' `
              -DceUri '${{ secrets.AZURE_DCE_URI }}' `
              -StreamName 'Custom-FylgyrRaw' `
              -ClientId '${{ secrets.AZURE_CLIENT_ID }}' `
              -TenantId '${{ secrets.AZURE_TENANT_ID }}' `
              -FederatedToken $federatedToken
