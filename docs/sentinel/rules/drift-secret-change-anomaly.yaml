name: Fylgyr-Drift-SecretChange-Anomaly
severity: Medium
description: Secret-change anomaly (more than 5 changes in 1 hour)
query: |
  Fylgyr_CL
  | where Mode_s == "Drift"
  | where CheckName_s == "RecentSecretChange"
  | summarize SecretChangeCount=count() by bin(TimeGenerated, 1h), Resource_s
  | where SecretChangeCount > 5
